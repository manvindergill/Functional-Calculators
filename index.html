<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Calculators</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="container py-5 text-center">
        <h1 class="fw-bold">Smart Utility Calculators</h1>
        <p>
            Calculate Interest, BMI and Daily Calorie Requirements instantly.
        </p>
    </section>

    <div class="container pb-5">
        <div class="row g-4">

            <!----------------------------------------------- Interest Calculator -->
            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">

                        <h3 class="mb-3">
                            <i class="bi bi-calculator-fill"></i>
                            Interest Calculator
                        </h3>

                        <p class="small text-muted">
                            SI = (Principal * Rate * Time) / 100
                        </p>

                        <input type="number" id="principal" class="form-control mb-3" placeholder="Principal Amount">

                        <input type="number" id="rate" class="form-control mb-3" placeholder="Rate (%)">

                        <input type="number" id="time" class="form-control mb-3" placeholder="Time (Years)">

                        <div class="d-flex gap-2">
                            <button id="interestBtn" class="btn btn-primary flex-grow-1">
                                Calculate
                            </button>

                            <button id="interestReset" class="btn btn-outline-secondary">
                                Reset
                            </button>
                        </div>

                        <div id="interestResult" class="mt-3"></div>

                    </div>
                </div>
            </div>

            <!---------------------------------------------------------- BMI Calculator -->
            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">

                        <h3 class="mb-3">
                            <i class="bi bi-heart-pulse-fill"></i>
                            BMI Calculator
                        </h3>

                        <input type="number" id="height" class="form-control mb-3" placeholder="Height (cm)">

                        <input type="number" id="weight" class="form-control mb-3" placeholder="Weight (kg)">

                        <div class="d-flex gap-2">
                            <button id="bmiBtn" class="btn btn-success flex-grow-1">
                                Calculate
                            </button>

                            <button id="bmiReset" class="btn btn-outline-secondary">
                                Reset
                            </button>
                        </div>

                        <div id="bmiResult" class="mt-3"></div>

                    </div>
                </div>
            </div>

            <!------------------------------------------------ Calorie Calculator -->
            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">

                        <h3 class="mb-3">
                            <i class="bi bi-fire"></i>
                            Calorie Calculator
                        </h3>

                        <input type="number" id="age" class="form-control mb-3" placeholder="Age">

                        <select id="gender" class="form-select mb-3">
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>

                        <input type="number" id="calorieWeight" class="form-control mb-3" placeholder="Weight (kg)">

                        <input type="number" id="calorieHeight" class="form-control mb-3" placeholder="Height (cm)">

                        <select id="activityLevel" class="form-select mb-3">
                            <option value="">Activity Level</option>
                            <option value="1.2">Sedentary</option>
                            <option value="1.375">Lightly Active</option>
                            <option value="1.55">Moderately Active</option>
                            <option value="1.725">Very Active</option>
                        </select>

                        <div class="d-flex gap-2">
                            <button id="calorieBtn" class="btn btn-danger flex-grow-1">
                                Calculate
                            </button>

                            <button id="calorieReset" class="btn btn-outline-secondary">
                                Reset
                            </button>
                        </div>

                        <div id="calorieResult" class="mt-3"></div>

                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
